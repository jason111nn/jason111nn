name: generate profile visual contents

on:
  schedule:
    - cron: "0 */12 * * *" # 每 12 小時更新一次
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 建立輸出目錄
      - name: Create dist directory
        run: mkdir -p dist

      # 2. 🐍 生成貪食蛇 (保持你成功的設定)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jason111nn
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. 📊 生成統計圖 (避開 Unexpected input 警告)
      - name: generate github-stats.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}
          user: jason111nn
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Taipei
          filename: github-stats.svg          
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          output_action: none
          debug: yes
          verbose: yes

      - name: Move and Verify stats
        run: |
          if [ -f github-stats.svg ]; then
            mv github-stats.svg dist/github-stats.svg
            echo "✅ Success: github-stats.svg has been moved to dist/"
          else
            echo "❌ Error: github-stats.svg was NOT generated!"
            ls -la # 列出檔案清單幫助除錯
            exit 1
          fi

      - name: push all contents to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}