name: generate profile visual contents

on:
  schedule:
    - cron: "0 */12 * * *" # 每 12 小時更新一次
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 建立輸出目錄
      - name: Create dist directory
        run: mkdir -p dist

      # 2. 🐍 生成貪食蛇 (放到 dist/)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jason111nn
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. 📊 生成統計圖 (避開路徑地雷)
      - name: generate github-stats.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}
          user: jason111nn
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Taipei
          
          # 這裡不設定 filename，讓它用預設的 github-metrics.svg
          # 這裡也不設 config_theme，避免 Unexpected input 警告
          
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          output_action: none

      - name: Move and rename stats
        run: |
          # metrics 預設會生出 github-metrics.svg
          if [ -f github-metrics.svg ]; then
            mv github-metrics.svg dist/github-stats.svg
            echo "Success: github-stats.svg moved to dist/"
          else
            echo "Error: github-metrics.svg was not found in root!"
            ls -la # 印出檔案列表幫你 Debug
            exit 1
          fi

      # 4. 把 dist 內的所有檔案推送到 output 分支
      - name: push all contents to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}