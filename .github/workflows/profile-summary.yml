name: generate profile visual contents

on:
  schedule:
    - cron: "0 */12 * * *" # 每 12 小時更新一次
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 建立輸出目錄
      - name: Create dist directory
        run: mkdir -p dist

      # 2. 🐍 生成貪食蛇 (放到 dist/)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jason111nn
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. 📊 生成專業統計圖 (取代原本失效的工具)
      # 產出的檔名會叫 github-stats.svg，這樣你不用改 README 的連結
      - name: generate github-stats.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}
          user: jason111nn
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Taipei
          filename: dist/github-stats.svg
          config_display: columns
          # 設定 Dracula 風格配色
          base_indepth: yes
          config_order: base.header, base.repositories, base.metadata
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          # 這裡不讓它自動 commit，我們統一由最後一個 step 處理
          output_action: none

      # 4. 把產生的 svg (蛇 + 統計圖) 推送到 output 分支
      - name: push all contents to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}